name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-tag.outputs.tag }}';
            const isPreRelease = /-(beta|rc|alpha)/.test(tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Nouto ${tag}`,
              body: `Nouto ${tag}`,
              draft: true,
              prerelease: isPreRelease,
            });
            return data.id;

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm run build:core
          pnpm run build:transport

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: packages/desktop
          args: --target ${{ matrix.target }}
          updaterJsonPreferNsis: true

  publish-release:
    needs: [create-release, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });
            fs.mkdirSync('artifacts', { recursive: true });
            for (const asset of assets) {
              const response = await github.request(`GET /repos/{owner}/{repo}/releases/assets/{asset_id}`, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { Accept: 'application/octet-stream' },
              });
              fs.writeFileSync(path.join('artifacts', asset.name), Buffer.from(response.data));
              console.log(`Downloaded: ${asset.name}`);
            }

      - name: Generate latest.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ needs.create-release.outputs.tag }}';
            const version = tag.replace(/^v/, '');
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;

            const readSig = (name) => {
              try { return fs.readFileSync(`artifacts/${name}`, 'utf8').trim(); } catch { return ''; }
            };

            const platforms = {
              'linux-x86_64': {
                url: `${releaseUrl}/nouto_${version}_amd64.AppImage.tar.gz`,
                signature: readSig(`nouto_${version}_amd64.AppImage.tar.gz.sig`),
              },
              'darwin-aarch64': {
                url: `${releaseUrl}/nouto_${version}_aarch64.app.tar.gz`,
                signature: readSig(`nouto_${version}_aarch64.app.tar.gz.sig`),
              },
              'darwin-x86_64': {
                url: `${releaseUrl}/nouto_${version}_x64.app.tar.gz`,
                signature: readSig(`nouto_${version}_x64.app.tar.gz.sig`),
              },
              'windows-x86_64': {
                url: `${releaseUrl}/nouto_${version}_x64-setup.nsis.zip`,
                signature: readSig(`nouto_${version}_x64-setup.nsis.zip.sig`),
              },
            };

            // Remove platforms with no signature (build didn't produce that artifact)
            for (const [key, val] of Object.entries(platforms)) {
              if (!val.signature) delete platforms[key];
            }

            const manifest = {
              version,
              notes: `Nouto ${tag}`,
              pub_date: new Date().toISOString(),
              platforms,
            };

            fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated latest.json:', JSON.stringify(manifest, null, 2));

      - name: Delete auto-generated latest.json (if any) and upload new one
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseId = ${{ needs.create-release.outputs.release_id }};

            // Delete any existing latest.json uploaded by tauri-action
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });
            for (const asset of assets) {
              if (asset.name === 'latest.json') {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
                console.log('Deleted existing latest.json');
              }
            }

            // Upload the comprehensive latest.json
            const content = fs.readFileSync('latest.json');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: content,
            });
            console.log('Uploaded latest.json');

            // Publish the release (undraft)
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });
            console.log('Release published');
