[package]
name = "nouto"
version = "0.0.1"
description = "The fastest REST API client - pure Rust + Tauri"
authors = ["Nouto Contributors"]
license = "MIT"
repository = "https://github.com/nouto/nouto"
edition = "2021"

[lib]
name = "nouto_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "nouto"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
# Tauri core
tauri = { version = "2.0", features = ["devtools"] }
tauri-plugin-dialog = "2.7"
tauri-plugin-fs = "2.5"
tauri-plugin-shell = "2.0"
tauri-plugin-opener = "2.0"
tauri-plugin-single-instance = "2.0"
tauri-plugin-deep-link = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
zip = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# HTTP stack (Phase 2)
reqwest = { version = "0.12", features = ["json", "gzip", "brotli", "deflate", "zstd", "multipart", "stream", "rustls-tls", "socks", "blocking"], default-features = false }
hyper = "1.0"
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1"
http = "1.0"
tokio = { version = "1.40", features = ["full"] }

# Compression (Phase 2)
flate2 = "1.0"
brotli = "6.0"
zstd = "0.13"

# Font enumeration
font-loader = "0.11"

# Utilities
form_urlencoded = "1.2"
urlencoding = "2.1"
base64 = "0.22"
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
bytes = "1.0"
futures = "0.3"

# WebSocket (Phase 5)
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }

# gRPC stack
tonic = { version = "0.12", features = ["tls", "tls-roots"] }
tonic-reflection = "0.12"
prost = "0.13"
prost-reflect = { version = "0.14", features = ["serde"] }
protox = "0.7"
tokio-stream = "0.1"
async-stream = "0.3"

# Script engine (Phase 4)
rquickjs = { version = "0.9", features = ["full-async", "parallel"] }

# OS keychain (Windows Credential Manager, macOS Keychain, libsecret)
keyring = { version = "3", features = ["sync-secret-service"] }

# Data file parsing (Phase 14)
csv = "1.3"
calamine = "0.26"

# File system watcher (Phase 11)
notify = "7"
notify-debouncer-mini = "0.5"

# Digest auth (RFC 7616) + AWS SigV4 + NTLM
digest = "0.10"
md4 = "0.10"
md-5 = "0.10"
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
regex = "1.10"
rand = "0.9"
serde_json_path = "0.7"
jsonschema = "0.17"

[dev-dependencies]
tempfile = "3"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-cli = "2.0"
