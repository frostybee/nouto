[package]
name = "hivefetch"
version = "0.0.1"
description = "The fastest REST API client - pure Rust + Tauri"
authors = ["HiveFetch Contributors"]
license = "MIT"
repository = "https://github.com/hivefetch/hivefetch"
edition = "2021"

[lib]
name = "hivefetch_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "hivefetch"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
# Tauri core
tauri = { version = "2.0", features = ["devtools"] }
tauri-plugin-dialog = "2.0"
tauri-plugin-fs = "2.0"
tauri-plugin-shell = "2.0"
tauri-plugin-single-instance = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# HTTP stack (Phase 2)
reqwest = { version = "0.12", features = ["json", "gzip", "brotli", "deflate", "multipart", "stream", "rustls-tls", "socks"], default-features = false }
hyper = "1.0"
hyper-util = { version = "0.1", features = ["full"] }
http = "1.0"
tokio = { version = "1.40", features = ["full"] }

# Compression (Phase 2)
flate2 = "1.0"
brotli = "6.0"
zstd = "0.13"

# Utilities
form_urlencoded = "1.2"
base64 = "0.22"
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
bytes = "1.0"
futures = "0.3"

# gRPC stack
tonic = { version = "0.12", features = ["tls", "tls-roots"] }
tonic-reflection = "0.12"
prost = "0.13"
prost-reflect = { version = "0.14", features = ["serde"] }
protox = "0.7"

# Digest auth (RFC 7616)
digest = "0.10"
md-5 = "0.10"
sha2 = "0.10"
hex = "0.4"
regex = "1.10"
rand = "0.9"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-cli = "2.0"
