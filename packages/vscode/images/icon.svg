<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Concept: Minimal geometric bee face (front view) -->
  <!-- Head outline -->
  <circle cx="12" cy="13" r="7"/>
  <!-- Eyes -->
  <circle cx="9.5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="14.5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Antennae -->
  <line x1="9" y1="6" x2="7" y2="2"/>
  <circle cx="6.5" cy="1.5" r="1" fill="currentColor" stroke="none"/>
  <line x1="15" y1="6" x2="17" y2="2"/>
  <circle cx="17.5" cy="1.5" r="1" fill="currentColor" stroke="none"/>
  <!-- Mouth / smile -->
  <path d="M9.5,16 Q12,18.5 14.5,16"/>
  <!-- Stripe on forehead -->
  <line x1="8" y1="9.5" x2="16" y2="9.5" stroke-width="1"/>
</svg>
