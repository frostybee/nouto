  <polygon points="12,1 4.5,8.5 4,15.5 20,15.5 19.5,8.5" fill="currentColor" stroke="none"/>
  <!-- Brim -->
  <line x1="3" y1="15.5" x2="21" y2="15.5" stroke-width="3"/>
  <!-- Nose guard -->
  <polygon points="10.5,15.5 12,24 13.5,15.5" fill="currentColor" stroke="none"/>
  <!-- Eye slits -->
  <line x1="5.5" y1="18.5" x2="10" y2="18.5" stroke-width="2.5"/>
  <line x1="14" y1="18.5" x2="18.5" y2="18.5" stroke-width="2.5"/>
</svg>
