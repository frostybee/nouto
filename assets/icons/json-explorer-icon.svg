<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f3f"/>
      <stop offset="100%" stop-color="#0c1a24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#3de8d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3de8d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle glow behind tree -->
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Left curly brace -->
  <path d="M82,38 C63,38 52,49 52,66 L52,112 C52,124 40,131 30,131 C40,131 52,138 52,150 L52,190 C52,207 63,218 82,218"
        fill="none" stroke="#3de8d4" stroke-width="10" stroke-linecap="round"/>

  <!-- Right curly brace -->
  <path d="M174,38 C193,38 204,49 204,66 L204,112 C204,124 216,131 226,131 C216,131 204,138 204,150 L204,190 C204,207 193,218 174,218"
        fill="none" stroke="#3de8d4" stroke-width="10" stroke-linecap="round"/>

  <!-- Root node -->
  <circle cx="128" cy="82" r="10" fill="#3de8d4"/>

  <!-- Root to L1 stem -->
  <line x1="128" y1="92" x2="128" y2="114" stroke="#3de8d4" stroke-width="3"/>

  <!-- L1 horizontal -->
  <line x1="90" y1="114" x2="166" y2="114" stroke="#3de8d4" stroke-width="3"/>

  <!-- L1 drops -->
  <line x1="90"  y1="114" x2="90"  y2="134" stroke="#3de8d4" stroke-width="3"/>
  <line x1="166" y1="114" x2="166" y2="134" stroke="#3de8d4" stroke-width="3"/>

  <!-- L1 nodes -->
  <circle cx="90"  cy="142" r="8.5" fill="#3de8d4"/>
  <circle cx="166" cy="142" r="8.5" fill="#3de8d4"/>

  <!-- L2 left stems and horizontal -->
  <line x1="90" y1="151" x2="90"  y2="167" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="72" y1="167" x2="108" y2="167" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="72"  y1="167" x2="72"  y2="182" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="108" y1="167" x2="108" y2="182" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>

  <!-- L2 left nodes -->
  <circle cx="72"  cy="189" r="6.5" fill="#3de8d4" opacity="0.6"/>
  <circle cx="108" cy="189" r="6.5" fill="#3de8d4" opacity="0.6"/>

  <!-- L2 right stems and horizontal -->
  <line x1="166" y1="151" x2="166" y2="167" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="148" y1="167" x2="184" y2="167" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="148" y1="167" x2="148" y2="182" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>
  <line x1="184" y1="167" x2="184" y2="182" stroke="#3de8d4" stroke-width="2.5" opacity="0.6"/>

  <!-- L2 right nodes -->
  <circle cx="148" cy="189" r="6.5" fill="#3de8d4" opacity="0.6"/>
  <circle cx="184" cy="189" r="6.5" fill="#3de8d4" opacity="0.6"/>
</svg>
