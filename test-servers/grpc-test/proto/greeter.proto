syntax = "proto3";

package helloworld;

service Greeter {
  // Basic unary call
  rpc SayHello (HelloRequest) returns (HelloReply);

  // Echoes back the metadata sent with the request
  rpc SayHelloWithMetadata (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
  // Populated by SayHelloWithMetadata — shows the metadata keys the server received
  repeated string receivedMetadataKeys = 2;
}
